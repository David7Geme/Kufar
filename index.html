<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemwaroldstore</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --p: #00d2ff; --bg: #0a0a0c; --card: #16161a; --text: #ffffff; --rad: 16px; }
        body { font-family: 'Manrope', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; color: var(--text); overflow-x: hidden; }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--p); color: #000; padding: 12px 25px; border-radius: 30px; z-index: 9999; transition: 0.4s; font-weight: 800; box-shadow: 0 5px 15px rgba(0,210,255,0.3); }
        #toast.show { transform: translateX(-50%) translateY(0); }

        /* ШАПКА С КЛИКАБЕЛЬНЫМ ЛОГО */
        .header { background: #16161a; padding: 12px 15px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 2000; border-bottom: 1px solid #23232e; }
        .logo-link { display: flex; align-items: center; text-decoration: none; gap: 8px; cursor: pointer; }
        .logo-img { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; background: #23232e; }
        .brand { font-weight: 800; font-size: 16px; color: var(--p); text-transform: uppercase; letter-spacing: 1px; }
        
        .search-bar { flex: 1; }
        .search-bar input { width: 100%; background: #23232e; border: none; border-radius: 12px; padding: 10px; outline: none; color: white; font-size: 14px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .card { background: var(--card); border-radius: var(--rad); overflow: hidden; border: 1px solid #23232e; transition: 0.2s; }
        .card img { width: 100%; height: 160px; object-fit: cover; background: #23232e; }
        .card-info { padding: 12px; }
        .price { font-weight: 800; font-size: 17px; color: var(--p); }
        .title { font-size: 12px; color: #a1a1aa; margin-top: 5px; height: 34px; overflow: hidden; line-height: 1.4; }

        .page { display: none; animation: fadeIn 0.2s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .box { background: var(--card); margin: 15px; padding: 20px; border-radius: var(--rad); border: 1px solid #23232e; }
        h2 { margin-top: 0; font-size: 20px; color: var(--p); }
        input, textarea { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #23232e; border-radius: 12px; background: #0a0a0c; color: white; font-family: inherit; outline: none; }
        input:focus { border-color: var(--p); }
        
        .file-label { display: block; background: #23232e; color: var(--p); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 12px; border: 1px dashed var(--p); cursor: pointer; font-weight: 700; transition: 0.2s; }
        .file-label:active { background: rgba(0,210,255,0.1); }
        #img-preview { width: 100%; border-radius: 12px; margin-bottom: 12px; display: none; border: 1px solid #23232e; }

        .btn { background: var(--p); color: #000; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { background: #555; cursor: not-allowed; }
        
        .nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #16161a; display: flex; border-top: 1px solid #23232e; z-index: 5000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #71717a; cursor: pointer; font-weight: 600; }
        .nav-item.active { color: var(--p); }
        .nav-item i { font-size: 24px; font-style: normal; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div id="toast">Gemwaroldstore</div>

    <header class="header">
        <div class="logo-link" onclick="nav('home')">
            <img src="logo.jpg" alt="Logo" class="logo-img" onerror="this.style.display='none'"> 
            <span class="brand">Gemwarold</span>
        </div>
        <div class="search-bar"><input type="text" id="q" placeholder="Поиск в Store..." oninput="updateSearch()"></div>
    </header>

    <div id="p-home" class="page active"><div id="feed" class="grid"></div></div>
    
    <div id="p-post" class="page">
        <div class="box">
            <h2>Новый лот</h2>
            <input type="text" id="in-title" placeholder="Название товара">
            <input type="number" id="in-price" placeholder="Цена (BYN)">
            
            <label class="file-label" for="in-file">📸 ФОТО ИЗ ГАЛЕРЕИ</label>
            <input type="file" id="in-file" accept="image/*" style="display:none" onchange="previewFile()">
            <img id="img-preview">

            <textarea id="in-desc" rows="3" placeholder="Описание и контакты..."></textarea>
            <button class="btn" id="save-btn" onclick="save()">ОПУБЛИКОВАТЬ</button>
        </div>
    </div>

    <div id="p-acc" class="page">
        <div id="auth" class="box">
            <h2>Вход в кабинет</h2>
            <input type="email" id="u-email-input" placeholder="Введите Email">
            <button class="btn" onclick="login()">ВОЙТИ</button>
        </div>
        <div id="user" class="box" style="display:none; text-align:center">
            <div style="font-size: 40px; margin-bottom: 10px;">👤</div>
            <h3 id="u-mail-display"></h3>
            <p id="u-id-display" style="color:var(--p); font-weight:800; font-size: 14px;"></p>
            <button class="btn" style="background:#23232e; color:white; margin-top:15px" onclick="logout()">Выйти из аккаунта</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" id="n-home" onclick="nav('home')"><i>💎</i>Витрина</div>
        <div class="nav-item" id="n-post" onclick="goPost()"><i>⚡</i>Продать</div>
        <div class="nav-item" id="n-acc" onclick="nav('acc')"><i>👤</i>Профиль</div>
    </nav>
