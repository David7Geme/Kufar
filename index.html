<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemwaroldstore</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00d2ff; --bg: #0a0a0c; --card: #16161a; --text: #ffffff; --rad: 16px; }
        body { font-family: 'Manrope', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; color: var(--text); overflow-x: hidden; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--p); color: #000; padding: 12px 25px; border-radius: 30px; z-index: 9999; transition: 0.4s; font-weight: 800; }
        #toast.show { transform: translateX(-50%) translateY(0); }
        .header { background: #16161a; padding: 12px 15px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 2000; border-bottom: 1px solid #23232e; }
        .logo { width: 35px; height: 35px; border-radius: 8px; object-fit: cover; cursor: pointer; }
        .brand { font-weight: 800; font-size: 16px; color: var(--p); text-decoration: none; text-transform: uppercase; cursor: pointer; }
        .search-bar { flex: 1; }
        .search-bar input { width: 100%; background: #23232e; border: none; border-radius: 12px; padding: 10px; outline: none; color: white; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .card { background: var(--card); border-radius: var(--rad); overflow: hidden; border: 1px solid #23232e; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        .card-info { padding: 10px; }
        .price { font-weight: 800; font-size: 17px; color: var(--p); }
        .title { font-size: 12px; color: #a1a1aa; margin-top: 4px; height: 32px; overflow: hidden; }
        .page { display: none; }
        .page.active { display: block; }
        .box { background: var(--card); margin: 15px; padding: 20px; border-radius: var(--rad); border: 1px solid #23232e; }
        input, textarea { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #23232e; border-radius: 12px; background: #0a0a0c; color: white; font-family: inherit; box-sizing: border-box; }
        .file-label { display: block; background: #23232e; color: var(--p); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 12px; border: 1px dashed var(--p); cursor: pointer; font-weight: 700; }
        #img-preview { width: 100%; border-radius: 12px; margin-bottom: 12px; display: none; border: 1px solid #23232e; }
        .btn { background: var(--p); color: #000; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #16161a; display: flex; border-top: 1px solid #23232e; z-index: 5000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #71717a; cursor: pointer; }
        .nav-item.active { color: var(--p); }
        .nav-item i { font-size: 22px; font-style: normal; margin-bottom: 3px; }
    </style>
</head>
<body>
    <div id="toast">Gemwaroldstore</div>
    <header class="header">
        <img src="logo.jpg" class="logo" onclick="nav('home')" onerror="this.style.display='none'">
        <div class="brand" onclick="nav('home')">Gemwarold</div>
        <div class="search-bar"><input type="text" id="q" placeholder="Поиск товаров..." oninput="updateSearch()"></div>
    </header>

    <div id="p-home" class="page active"><div id="feed" class="grid"></div></div>
    <div id="p-post" class="page"><div class="box">
        <h2>Новый лот</h2>
        <input type="text" id="in-title" placeholder="Название">
        <input type="number" id="in-price" placeholder="Цена (BYN)">
        <label class="file-label" for="in-file">📸 ФОТО ИЗ ГАЛЕРЕИ</label>
        <input type="file" id="in-file" accept="image/*" style="display:none" onchange="previewFile()">
        <img id="img-preview">
        <textarea id="in-desc" rows="3" placeholder="Описание..."></textarea>
        <button class="btn" id="save-btn" onclick="save()">ОПУБЛИКОВАТЬ</button>
    </div></div>
    <div id="p-acc" class="page">
        <div id="auth" class="box"><h2>Вход</h2><input type="email" id="u-email-input" placeholder="Email"><button class="btn" onclick="login()">ВОЙТИ</button></div>
        <div id="user" class="box" style="display:none; text-align:center"><h3 id="u-mail-display"></h3><p id="u-id-display" style="color:var(--p); font-weight:800"></p><button class="btn" style="background:#23232e; color:white; margin-top:15px" onclick="logout()">Выйти</button></div>
    </div>

    <nav class="nav">
        <div class="nav-item active" id="n-home" onclick="nav('home')"><i>💎</i>Витрина</div>
        <div class="nav-item" id="n-post" onclick="goPost()"><i>⚡</i>Продать</div>
        <div class="nav-item" id="n-acc" onclick="nav('acc')"><i>👤</i>Профиль</div>
    </nav>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD4_NVq2Tw6TaEDMTZj86zbvtJUbHOE6js", authDomain: "kywar-c73ac.firebaseapp.com", databaseURL: "https://kywar-c73ac-default-rtdb.firebaseio.com", projectId: "kywar-c73ac", storageBucket: "kywar-c73ac.firebasestorage.app", messagingSenderId: "817464444818", appId: "1:817464444818:web:b9ab1f1ca2c9531358e34b" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const TG_TOKEN = "8786462162:AAFoQOvILhij4WVX_zTEK3-zdwAPsqUzRZA", TG_CHAT_ID = "8001086221", ADMIN = "davidgemer507@gmail.com";
        let user = null, allData = [], lastUpdateId = 0, currentBase64 = "";

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-'+id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
            window.scrollTo(0,0);
        }

        function updateSearch() {
            const query = document.getElementById('q').value.toLowerCase();
            const filtered = allData.filter(i => i.title.toLowerCase().includes(query));
            render(filtered);
        }

        function previewFile() {
            const file = document.getElementById('in-file').files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                const img = new Image(); img.src = reader.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                    const maxW = 500; const scale = maxW / img.width;
                    canvas.width = maxW; canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    currentBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('img-preview').src = currentBase64;
                    document.getElementById('img-preview').style.display = 'block';
                }
            };
            if (file) reader.readAsDataURL(file);
        }

        function save() {
            const t = document.getElementById('in-title').value, p = document.getElementById('in-price').value;
            if(t && p && currentBase64) {
                document.getElementById('save-btn').disabled = true;
                db.ref('items').push().set({ title: t, price: Number(p), img: currentBase64, owner: user, id: Date.now() }).then(() => {
                    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=💎 <b>Gemwaroldstore</b>%0A📦 Лот: ${t}%0A💰 Цена: ${p} BYN%0A👤 Продавец: ${user}&parse_mode=HTML`);
                    toast("Успешно!"); location.reload();
                });
            } else alert("Заполните всё!");
        }

        function login(saved) {
            const val = saved || document.getElementById('u-email-input').value.trim().toLowerCase();
            if(!val) return;
            db.ref('blacklist/' + val.replace(/\./g, ',')).once('value', s => {
                if(s.exists()) return alert("BAN");
                user = val; localStorage.setItem('gemer_user', user);
                let hash = 0; for (let i = 0; i < user.length; i++) hash = ((hash << 5) - hash) + user.charCodeAt(i);
                const myID = Math.abs(hash % 10000);
                db.ref('user_ids/' + myID).set(user);
                document.getElementById('auth').style.display = 'none';
                document.getElementById('user').style.display = 'block';
                document.getElementById('u-mail-display').innerText = user;
                document.getElementById('u-id-display').innerText = "ID: " + myID;
                if(user === ADMIN) startBotListener();
                nav('home');
            });
        }

        function startBotListener() {
            setInterval(() => {
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/getUpdates?offset=${lastUpdateId+1}`).then(r=>r.json()).then(res=>{
                    if(res.result) res.result.forEach(upd => {
                        lastUpdateId = upd.update_id; const m = upd.message?.text || "";
                        if(m.startsWith('/ban')) {
                            const t = m.split(' ')[1];
                            if(t?.includes('@')) db.ref('blacklist/'+t.replace(/\./g,',')).set(true);
                            else if(t) db.ref('user_ids/'+t).once('value', s => { if(s.val()) db.ref('blacklist/'+s.val().replace(/\./g,',')).set(true); });
                        }
                    });
                });
            }, 4000);
        }

        function render(list) {
            const c = document.getElementById('feed'); if(!c) return;
            c.innerHTML = list.sort((a,b)=>b.id-a.id).map(i => `
                <div class="card">
                    <img src="${i.img}">
                    <div class="card-info">
                        <div class="price">${i.price} BYN</div>
                        <div class="title">${i.title}</div>
                        ${user===ADMIN?`<button onclick="db.ref('items').child('${i.key}').remove()" style="background:#ff4b4b;color:white;border:0;width:100%;border-radius:8px;margin-top:8px;padding:6px;font-weight:800">УДАЛИТЬ</button>`:''}
                    </div>
                </div>`).join('');
        }

        function logout() { localStorage.removeItem('gemer_user'); location.reload(); }
        window.onload = () => { if(localStorage.getItem('gemer_user')) login(localStorage.getItem('gemer_user')); };
        function goPost() { user ? nav('post') : nav('acc'); }
        function toast(txt) { const t = document.getElementById('toast'); t.innerText = txt; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        db.ref('items').on('value', s => { allData = []; s.forEach(x => allData.push({...x.val(), key: x.key})); updateSearch(); });
    </script>
</body>
</html>
