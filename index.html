<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кот-Маркет</title>
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f0f2f5; }
        #authScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #00d36a; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .auth-box { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
        header { background: #fff; padding: 10px 20px; display: none; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; }
        .logo-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .container { max-width: 800px; margin: 15px auto; padding: 0 10px; display: none; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: #00d36a; color: white; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { background: white; border-radius: 12px; overflow: hidden; padding-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-img { width: 100%; height: 120px; object-fit: cover; background: #eee; }
        .admin-panel { display: none; background: #222; color: white; margin-top: 20px; padding: 15px; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-box">
            <img src="logo.jpg" style="width:70px;height:70px;border-radius:50%;margin-bottom:10px;">
            <h2>Вход</h2>
            <input type="text" id="uI" placeholder="Логин">
            <input type="password" id="pI" placeholder="Пароль">
            <button class="btn" onclick="handleAuth()">ВОЙТИ</button>
        </div>
    </div>

    <header id="h">
        <div style="display: flex; align-items: center; gap: 8px;">
            <img src="logo.jpg" class="logo-img">
            <b id="userLabel"></b>
        </div>
        <button class="btn" style="width:auto; padding: 5px 15px;" onclick="document.getElementById('addM').style.display='flex'">+ Подать</button>
    </header>

    <div class="container" id="c">
        <div class="grid" id="grid"></div>
        <div id="adminPanel" class="admin-panel">
            <h4 style="color:#00d36a">👥 База (Admin):</h4>
            <div id="uList"></div>
        </div>
        <button onclick="location.reload()" style="margin-top:30px;opacity:0.5;background:none;border:none;width:100%">Выйти</button>
    </div>

    <div id="addM" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:white; padding:20px; border-radius:15px; width:90%; max-width:400px;">
            <h3>Новый товар</h3>
            <input type="text" id="tT" placeholder="Название">
            <input type="number" id="tP" placeholder="Цена">
            <input type="text" id="tI" placeholder="Ссылка на фото">
            <button class="btn" onclick="addAd()">Опубликовать</button>
            <button class="btn" onclick="document.getElementById('addM').style.display='none'" style="background:#eee;color:black;margin-top:5px;">Отмена</button>
        </div>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('k_users')) || {"David_Gemer":"sasaha123"};
        let ads = JSON.parse(localStorage.getItem('k_ads')) || [];
        let me = "";

        function handleAuth() {
            const u = document.getElementById('uI').value.trim();
            const p = document.getElementById('pI').value.trim();
            if(!u || !p) return alert("Заполни поля!");

            if(users[u]) {
                if(users[u] === p) start(u);
                else alert("Неверный пароль!");
            } else {
                users[u] = p;
                localStorage.setItem('k_users', JSON.stringify(users));
                start(u);
            }
        }

        function start(u) {
            me = u;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('h').style.display = 'flex';
            document.getElementById('c').style.display = 'block';
            document.getElementById('userLabel').innerText = u;
            if(u === "David_Gemer") showAdmin();
            render();
        }

        function showAdmin() {
            document.getElementById('adminPanel').style.display = 'block';
            const list = document.getElementById('uList');
            list.innerHTML = '';
            for(let name in users) {
                list.innerHTML += `<div style="font-size:12px;margin-top:5px;border-bottom:1px solid #444">👤 ${name} (п: ${users[name]})</div>`;
            }
        }

        function render() {
            const g = document.getElementById('grid');
            g.innerHTML = '';
            ads.forEach(a => {
                g.innerHTML += `<div class="card"><img src="${a.i}" class="card-img"><div style="padding:8px"><div style="font-size:10px;color:#00d36a">👤 ${a.u}</div><b>${a.p} BYN</b><div style="font-size:12px">${a.t}</div></div></div>`;
            });
        }

        function addAd() {
            const t = document.getElementById('tT').value;
            const p = document.getElementById('tP').value;
            const i = document.getElementById('tI').value || 'https://via.placeholder.com/150';
            if(!t || !p) return alert("Данные!");
            ads.unshift({t, p, i, u: me});
            localStorage.setItem('k_ads', JSON.stringify(ads));
            render();
            document.getElementById('addM').style.display = 'none';
        }
    </script>
</body>
</html>
