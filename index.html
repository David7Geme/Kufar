<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kufar | kywar Ultimate</title>
    <style>
        :root {
            --main-green: #2ecc71;
            --dark-gray: #2d3436;
            --light-gray: #f1f2f6;
            --white: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body { 
            background: var(--light-gray); 
            color: var(--dark-gray); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 0; 
            padding-bottom: 90px; 
            overflow-x: hidden;
        }

        /* ШАПКА И ПОИСК */
        .header {
            background: var(--white);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #e0e0e0;
        }
        .logo-img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: cover;
            background: var(--main-green);
        }
        .search-container {
            background: #f0f2f5;
            flex: 1;
            display: flex;
            align-items: center;
            padding: 10px 16px;
            border-radius: 25px;
        }
        .search-container input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            font-size: 15px;
            color: #333;
        }

        /* БАННЕРЫ */
        .banners-wrapper {
            display: flex;
            gap: 12px;
            padding: 15px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .banners-wrapper::-webkit-scrollbar { display: none; }
        .banner-card {
            min-width: 280px;
            height: 140px;
            border-radius: 20px;
            padding: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
            box-shadow: var(--shadow);
        }
        .b-1 { background: linear-gradient(135deg, #1e3799, #4a69bd); }
        .b-2 { background: linear-gradient(135deg, #079992, #38ada9); }
        .banner-card h3 { margin: 0; font-size: 20px; line-height: 1.2; }

        /* КАТЕГОРИИ */
        .section-header {
            padding: 10px 16px;
            font-weight: 800;
            font-size: 18px;
            color: #1e272e;
        }
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 16px 20px;
        }
        .category-item {
            background: var(--white);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .category-item:active { transform: scale(0.96); }
        .cat-icon {
            width: 40px;
            height: 40px;
            background: #f0fdf4;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        .cat-text { font-size: 14px; font-weight: 600; }

        /* ОБЪЯВЛЕНИЯ (ЛЕНТА) */
        .ads-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 16px;
        }
        .ad-card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .ad-thumb {
            width: 100%;
            height: 130px;
            background: #dfe6e9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #95a5a6;
        }
        .ad-body { padding: 12px; flex-grow: 1; }
        .ad-price { font-size: 18px; font-weight: 800; color: #000; margin-bottom: 4px; }
        .ad-title { font-size: 14px; color: #4b4b4b; line-height: 1.3; height: 36px; overflow: hidden; }
        
        /* КНОПКИ ДЛЯ ТЕБЯ (АДМИН) */
        .admin-actions {
            background: #f8f9fa;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-top: 1px solid #eee;
        }
        .adm-btn {
            border: none;
            padding: 8px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }
        .btn-del { background: #ff7675; color: white; }
        .btn-ban { background: #2d3436; color: white; }

        /* НИЖНЕЕ МЕНЮ */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #eee;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
            z-index: 2000;
        }
        .tab-item {
            text-align: center;
            color: #a4b0be;
            font-size: 10px;
            text-decoration: none;
            flex: 1;
            cursor: pointer;
            border: none;
            background: none;
        }
        .tab-item.active { color: var(--main-green); }
        .tab-icon { font-size: 24px; display: block; margin-bottom: 4px; }

        /* МОДАЛЬНЫЕ ОКНА */
        .modal-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--white);
            z-index: 5000;
            padding: 24px;
            box-sizing: border-box;
            display: none;
            flex-direction: column;
        }
        .modal-page.show { display: flex; }
        .modal-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .btn-back {
            background: #f1f2f6;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
        }

        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            background: #f9f9f9;
        }

        .btn-submit {
            background: var(--main-green);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }

        .hidden { display: none !important; }

        /* СПИСОК БАНОВ В АДМИНКЕ */
        .ban-card {
            background: #fff0f0;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ffcccc;
        }
    </style>
</head>
<body>

<div class="header">
    <img src="Logo.jpg" class="logo-img" alt="L" id="main-logo">
    <div class="search-container">
        <input type="text" id="global-search" placeholder="Поиск в kywar">
    </div>
</div>

<div id="home-view">
    <div class="banners-wrapper">
        <div class="banner-card b-1"><h3>Квартиры на сутки<br>в твоем городе</h3></div>
        <div class="banner-card b-2"><h3>Безопасные покупки<br>с доставкой</h3></div>
    </div>

    <div class="section-header">Категории</div>
    <div class="categories-grid">
        <div class="category-item"><div class="cat-icon">🏠</div><span class="cat-text">Жилье</span></div>
        <div class="category-item"><div class="cat-icon">🚗</div><span class="cat-text">Авто</span></div>
        <div class="category-item"><div class="cat-icon">📱</div><span class="cat-text">Техника</span></div>
        <div class="category-item"><div class="cat-icon">👗</div><span class="cat-text">Одежда</span></div>
    </div>

    <div class="section-header">Рекомендации для вас</div>
    <div class="ads-grid" id="main-feed">
        </div>
</div>
