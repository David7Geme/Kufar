<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кот-Маркет: Аккаунты</title>
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        
        /* Экран входа и регистрации */
        #authScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #00d36a; display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .auth-box { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        /* Стили интерфейса */
        header { background: #fff; padding: 10px 20px; display: none; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); sticky: top; }
        .logo-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .container { max-width: 800px; margin: 15px auto; padding: 0 10px; display: none; }
        
        /* Кнопки и инпуты */
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main { background: #00d36a; color: white; }
        .btn-main:hover { background: #00b359; }

        /* Сетка товаров */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-img { width: 100%; height: 130px; object-fit: cover; background: #eee; }
        .card-info { padding: 8px; }
        .card-price { font-weight: bold; font-size: 1.1em; }
        .author-name { font-size: 0.75em; color: #888; margin-bottom: 4px; }

        /* Модалка */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <div id="authScreen">

            <h2 id="authTitle" style="text-align:center; margin-bottom:15px;">Вход</h2>
            <input type="text" id="userInp" placeholder="Придумайте логин">
            <input type="password" id="passInp" placeholder="Пароль">
            <button class="btn btn-main" onclick="handleAuth()" id="authBtn">Войти или Создать</button>
            <p id="authHint" style="font-size: 0.8em; color: #666; margin-top: 10px; text-align: center;">
                Если логина нет — аккаунт создастся автоматически.
            </p>
        </div>
    </div>

    <header id="h">

            <b id="userNameLabel"></b>
        </div>
        <button class="btn btn-main" style="width: auto; padding: 8px 15px;" onclick="showAdd(true)">+ Подать</button>
    </header>

    <div class="container" id="c">
        <div class="grid" id="grid"></div>

    </div>

    <div id="addM" class="modal">

            <h3>Новое объявление</h3>
            <input type="text" id="t" placeholder="Название">

            <input type="text" id="i" placeholder="Ссылка на фото">
            <button class="btn btn-main" onclick="add()">Опубликовать</button>
            <button class="btn" onclick="showAdd(false)" style="margin-top: 5px; background: #eee;">Отмена</button>
        </div>
    </div>
