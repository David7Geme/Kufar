<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kufar | kywar</title>
    <style>
        body { 
            background: #f8f8f8; color: #333; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding-bottom: 80px; 
        }

        /* Чистая верхняя панель без лишних надписей */
        .top-nav {
            background: #fff; padding: 10px 15px; display: flex; align-items: center; gap: 10px;
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #eee;
        }
        /* Логотип-иконка (твое Logo.jpg) */
        .brand-logo { width: 35px; height: 35px; border-radius: 8px; object-fit: cover; }

        .search-wrapper {
            background: #f0f0f0; flex: 1; display: flex; align-items: center;
            padding: 8px 15px; border-radius: 25px;
        }
        .search-wrapper input {
            background: transparent; border: none; outline: none; width: 100%; font-size: 15px;
        }

        /* Сетка категорий */
        .categories-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .cat-item {
            background: #fff; border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .cat-item .icon { width: 32px; height: 32px; background: #eee; border-radius: 6px; }

        /* Лента объявлений */
        .ads-container { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ad-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); position: relative; }
        .ad-img { width: 100%; height: 130px; background: #e0e0e0; }
        .ad-info { padding: 10px; }
        .ad-price { font-weight: bold; font-size: 17px; margin-bottom: 4px; }
        .ad-title { font-size: 13px; color: #666; height: 32px; overflow: hidden; }

        /* НИЖНЕЕ МЕНЮ */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: #fff;
            display: flex; justify-content: space-around; padding: 8px 0;
            border-top: 1px solid #eee; z-index: 1000;
        }
        .nav-item { text-align: center; color: #888; font-size: 10px; text-decoration: none; flex: 1; cursor: pointer; }
        .nav-item.active { color: #2ecc71; }
        .nav-icon { font-size: 22px; display: block; margin-bottom: 2px; }

        /* Кнопки админа внутри карточек */
        .admin-action-btn { 
            background: rgba(255, 68, 68, 0.9); color: white; border: none; 
            padding: 4px 8px; border-radius: 4px; font-size: 10px; margin-top: 5px; width: 100%;
        }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; padding: 20px; box-sizing: border-box; }
        .hidden { display: none; }
        .btn-close { background: #eee; border: none; padding: 10px; border-radius: 8px; margin-bottom: 20px; width: 100%; }
    </style>
</head>
<body>

<div class="top-nav">
    <img src="Logo.jpg" class="brand-logo" alt="">
    <div class="search-wrapper">
        <input type="text" id="global-search" placeholder="Поиск товаров">
    </div>
</div>

<div id="main-page">
    <div class="categories-grid">
        <div class="cat-item"><div class="icon"></div><span>Недвижимость</span></div>
        <div class="cat-item"><div class="icon"></div><span>Авто</span></div>
    </div>
    <div class="ads-container" id="ads-list"></div>
</div>

<div id="user-modal" class="modal hidden">
    <button class="btn-close" onclick="closeModal()">← Назад</button>
    
    <div id="auth-form">

        <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:8px;">
        <input type="password" id="password" placeholder="Пароль" style="width:100%; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:8px;">
        <button onclick="handleAuth()" style="width:100%; background:#2ecc71; color:white; border:none; padding:15px; border-radius:8px; font-weight:bold;">Войти</button>
    </div>

    <div id="admin-panel" class="hidden">

        <p>Вы вошли как главный админ</p>
        <div id="ban-list-container">
            </div>
    </div>
</div>

<div class="bottom-nav" id="menu">

</div>
