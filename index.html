<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GemerMarket Control Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --p: #1a73e8; --bg: #f8f9fb; --white: #fff; --rad: 20px; --shadow: 0 10px 25px rgba(0,0,0,0.05); }
        body { font-family: 'Manrope', sans-serif; background: var(--bg); margin: 0; padding-bottom: 110px; color: #333; overflow-x: hidden; }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #333; color: white; padding: 14px 28px; border-radius: 30px; z-index: 5000; transition: 0.5s; font-size: 14px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .header { background: white; padding: 14px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.03); }
        .brand { font-weight: 800; font-size: 20px; color: var(--p); text-decoration: none; min-width: fit-content; }
        .search-bar { flex: 1; }
        .search-bar input { width: 100%; background: #f1f3f4; border: none; border-radius: 14px; padding: 12px 15px; box-sizing: border-box; outline: none; font-size: 15px; }
        
        .online-status { background: #e8f5e9; color: #2e7d32; font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }
        .online-dot { width: 7px; height: 7px; background: #4caf50; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(76,175,80,0.4); } 70% { box-shadow: 0 0 0 6px rgba(76,175,80,0); } 100% { box-shadow: 0 0 0 0 rgba(76,175,80,0); } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 16px; }
        .card { background: white; border-radius: var(--rad); overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; animation: fadeIn 0.5s ease both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .card img { width: 100%; height: 150px; object-fit: cover; background: #eee; }
        .card-info { padding: 12px; }
        .price { font-weight: 800; font-size: 17px; color: #000; }
        .title { font-size: 13px; color: #666; height: 32px; overflow: hidden; margin-top: 5px; }

        .page { display: none; }
        .page.active { display: block; }
        .box { background: white; margin: 16px; padding: 25px; border-radius: var(--rad); box-shadow: var(--shadow); }
        input, textarea { width: 100%; padding: 16px; margin-bottom: 14px; border: 1px solid #eee; border-radius: 14px; box-sizing: border-box; font-family: inherit; font-size: 15px; background: #fafafa; }
        .btn { background: var(--p); color: white; border: none; width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; font-size: 16px; cursor: pointer; }

        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); display: flex; border-top: 1px solid #eee; padding: 14px 0; z-index: 1000; backdrop-filter: blur(10px); }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #bbb; cursor: pointer; font-weight: 700; }
        .nav-item.active { color: var(--p); }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 5px; font-style: normal; }
    </style>
</head>
<body>

    <div id="toast">GemerMarket</div>

    <header class="header">
        <a href="#" class="brand">GemerMarket</a>
        <div class="search-bar">
            <input type="text" id="q" placeholder="Поиск..." oninput="updateSearch()">
        </div>
        <div id="online-status" class="online-status" style="display:none">
            <div class="online-dot"></div>
            <span id="online-count">0</span>
        </div>
    </header>

    <div id="p-home" class="page active"><div id="feed" class="grid"></div></div>
    <div id="p-fav" class="page"><div id="fav-feed" class="grid"></div></div>

    <div id="p-post" class="page">
        <div class="box">
            <h2>Создать Лот</h2>
            <input type="text" id="in-title" placeholder="Название">
            <input type="number" id="in-price" placeholder="Цена">
            <input type="text" id="in-img" placeholder="Ссылка на фото">
            <textarea id="in-desc" rows="3" placeholder="Описание..."></textarea>
            <button class="btn" onclick="save()">Опубликовать</button>
        </div>
    </div>

    <div id="p-acc" class="page">
        <div id="auth" class="box">
            <h2>Вход</h2>
            <input type="email" id="email" placeholder="example@mail.com">
            <button class="btn" onclick="login()">Войти</button>
        </div>
        <div id="user" class="box" style="display:none; text-align:center">
            <div style="font-size: 50px;">👤</div>
            <h3 id="u-mail"></h3>
            <p id="u-status"></p>
            <button class="btn" style="background:#f1f3f4; color:#333; margin-top:20px" onclick="logout()">Выйти</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" id="n-home" onclick="nav('home')"><i>🏠</i>Лента</div>
        <div class="nav-item" id="n-fav" onclick="nav('fav')"><i>🤍</i>Избранное</div>
        <div class="nav-item" id="n-post" onclick="goPost()"><i>➕</i>Лот</div>
        <div class="nav-item" id="n-acc" onclick="nav('acc')"><i>👤</i>Профиль</div>
    </nav>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD4_NVq2Tw6TaEDMTZj86zbvtJUbHOE6js", authDomain: "kywar-c73ac.firebaseapp.com", databaseURL: "https://kywar-c73ac-default-rtdb.firebaseio.com", projectId: "kywar-c73ac", storageBucket: "kywar-c73ac.firebasestorage.app", messagingSenderId: "817464444818", appId: "1:817464444818:web:b9ab1f1ca2c9531358e34b" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const TG_TOKEN = "8786462162:AAFoQOvILhij4WVX_zTEK3-zdwAPsqUzRZA";
        const TG_CHAT_ID = "8001086221";
        const ADMIN = "davidgemer507@gmail.com";
        let lastUpdateId = 0, user = null, allData = [];

        function sendTelegram(text, itemKey, userEmail) {
            const kb = itemKey ? { inline_keyboard: [[{ text: "🗑 Удалить", url: window.location.href.split('?')[0]+`?delete=${itemKey}` }, { text: "🚫 Бан", url: window.location.href.split('?')[0]+`?ban=${userEmail}` }]] } : null;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ chat_id: TG_CHAT_ID, text: text, parse_mode: "HTML", reply_markup: kb }) });
        }

        function generateID(email) {
            let hash = 0; for (let i = 0; i < email.length; i++) hash = ((hash << 5) - hash) + email.charCodeAt(i);
            return Math.abs(hash % 10000);
        }

        // ВХОД С ПАМЯТЬЮ
        function login(savedEmail) {
            const e = savedEmail || document.getElementById('email').value.trim().toLowerCase();
            if(!e) return;
            const safe = e.replace(/\./g, ',');
            db.ref('blacklist/' + safe).once('value', s => {
                if (s.exists()) return alert("БАН");
                
                user = e;
                localStorage.setItem('gemer_user', e); // СОХРАНЯЕМ В ПАМЯТЬ
                const myID = generateID(e);
                db.ref('user_ids/' + myID).set(e);
                
                // Статус Онлайн
                const statusRef = db.ref('online_users/' + myID);
                statusRef.set({ email: e, last_seen: Date.now() });
                statusRef.onDisconnect().remove();

                document.getElementById('auth').style.display = 'none';
                document.getElementById('user').style.display = 'block';
                document.getElementById('u-mail').innerHTML = `${e}<br><small>ID: ${myID}</small>`;
                
                if(e === ADMIN) {
                    document.getElementById('u-status').innerText = "Владелец";
                    document.getElementById('online-status').style.display = 'flex';
                    db.ref('online_users').on('value', snap => { document.getElementById('online-count').innerText = snap.numChildren(); });
                    startBotListener();
                }
                if(!savedEmail) toast("Вход выполнен!");
                nav('home'); render(allData, 'feed');
            });
        }

        function logout() {
            localStorage.removeItem('gemer_user'); // Очищаем память
            location.reload();
        }

        // АВТО-ВХОД ПРИ ЗАГРУЗКЕ
        window.onload = () => {
            const remembered = localStorage.getItem('gemer_user');
            if(remembered) login(remembered);
        };

        function save() {
            const t = document.getElementById('in-title').value;
            const p = document.getElementById('in-price').value;
            const img = document.getElementById('in-img').value || 'https://via.placeholder.com/300';
            if(t && p) {
                const ref = db.ref('items').push();
                ref.set({ title: t, price: Number(p), img: img, owner: user, ownerID: generateID(user), id: Date.now() }).then(() => {
                    sendTelegram(`💎 <b>Новый Лот</b>\nТовар: ${t}\nЦена: ${p} BYN`, ref.key, user);
                    toast("Готово!"); nav('home');
                });
            }
        }

        function startBotListener() {
            setInterval(() => {
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`).then(r => r.json()).then(res => {
                    if (res.result) {
                        res.result.forEach(upd => {
                            lastUpdateId = upd.update_id;
                            const m = upd.message ? upd.message.text : "";
                            if (m.startsWith('/удалить')) {
                                const id = m.split(' ')[1];
                                db.ref('user_ids/' + id).once('value', snap => {
                                    if(snap.val()) db.ref('blacklist/' + snap.val().replace(/\./g, ',')).set(true);
                                });
                            }
                        });
                    }
                });
            }, 4000);
        }

        function nav(p) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            document.getElementById('n-'+p).classList.add('active');
        }

        function toast(txt) {
            const t = document.getElementById('toast');
            t.innerText = txt; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function updateSearch() {
            const query = document.getElementById('q').value.toLowerCase();
            render(allData.filter(i => i.title.toLowerCase().includes(query)), 'feed');
        }

        function render(list, target) {
            const c = document.getElementById(target);
            c.innerHTML = '';
            list.forEach((i, idx) => {
                c.innerHTML += `<div class="card" style="animation-delay: ${idx*0.05}s">
                    <img src="${i.img}">
                    <div class="card-info">
                        <div class="price">${i.price} BYN</div>
                        <div class="title">${i.title}</div>
                        ${user === ADMIN ? `<button onclick="db.ref('items').child('${i.key}').remove()" style="background:#ff5a5f;color:white;border:0;width:100%;border-radius:10px;margin-top:10px;padding:8px;font-weight:bold">УДАЛИТЬ</button>` : ''}
                    </div>
                </div>`;
            });
        }

        function goPost() { user ? nav('post') : nav('acc'); }

        db.ref('items').on('value', s => {
            allData = [];
            s.forEach(x => allData.push({...x.val(), key: x.key}));
            updateSearch();
        });
    </script>
</body>
</html>
