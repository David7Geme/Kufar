<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GemerMarket Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --p: #1a73e8; --bg: #f8f9fb; --rad: 22px; --shadow: 0 12px 30px rgba(0,0,0,0.06); }
        body { font-family: 'Manrope', sans-serif; background: var(--bg); margin: 0; padding-bottom: 110px; color: #333; }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #333; color: white; padding: 14px 28px; border-radius: 30px; z-index: 5000; transition: 0.5s; font-size: 14px; }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .header { background: white; padding: 14px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.03); }
        .brand { font-weight: 800; font-size: 20px; color: var(--p); text-decoration: none; }
        .search-bar { flex: 1; }
        .search-bar input { width: 100%; background: #f1f3f4; border: none; border-radius: 14px; padding: 12px 15px; box-sizing: border-box; outline: none; }
        
        .online-status { background: #e8f5e9; color: #2e7d32; font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }
        .online-dot { width: 7px; height: 7px; background: #4caf50; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(76,175,80,0.4); } 70% { box-shadow: 0 0 0 6px rgba(76,175,80,0); } 100% { box-shadow: 0 0 0 0 rgba(76,175,80,0); } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 16px; }
        .card { background: white; border-radius: var(--rad); overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; animation: fadeIn 0.4s ease both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card img { width: 100%; height: 150px; object-fit: cover; background: #f0f0f0; }
        .card-info { padding: 12px; }
        .price { font-weight: 800; font-size: 17px; color: #000; }
        .title { font-size: 13px; color: #666; height: 32px; overflow: hidden; margin-top: 5px; }

        .page { display: none; }
        .page.active { display: block; }
        .box { background: white; margin: 16px; padding: 25px; border-radius: var(--rad); box-shadow: var(--shadow); }
        input, textarea { width: 100%; padding: 16px; margin-bottom: 14px; border: 1px solid #eee; border-radius: 14px; box-sizing: border-box; font-family: inherit; background: #fafafa; }
        .btn { background: var(--p); color: white; border: none; width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; font-size: 16px; cursor: pointer; }

        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; padding: 14px 0; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #bbb; cursor: pointer; font-weight: 700; }
        .nav-item.active { color: var(--p); }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 5px; font-style: normal; }
    </style>
</head>
<body>

    <div id="toast">GemerMarket</div>

    <header class="header">
        <a href="#" class="brand">GemerMarket</a>
        <div class="search-bar">
            <input type="text" id="q" placeholder="Поиск..." oninput="updateSearch()">
        </div>
        <div id="online-status" class="online-status" style="display:none">
            <div class="online-dot"></div>
            <span id="online-count">0</span>
        </div>
    </header>

    <div id="p-home" class="page active"><div id="feed" class="grid"></div></div>
    <div id="p-fav" class="page"><div id="fav-feed" class="grid"></div></div>

    <div id="p-post" class="page">
        <div class="box">
            <h2>Создать Лот</h2>
            <input type="text" id="in-title" placeholder="Название товара">
            <input type="number" id="in-price" placeholder="Цена (BYN)">
            <input type="text" id="in-img" placeholder="Ссылка на фото">
            <textarea id="in-desc" rows="3" placeholder="Описание..."></textarea>
            <button class="btn" onclick="save()">Опубликовать</button>
        </div>
    </div>

    <div id="p-acc" class="page">
        <div id="auth" class="box">
            <h2>Вход</h2>
            <input type="email" id="email" placeholder="example@mail.com">
            <button class="btn" onclick="login()">Войти</button>
        </div>
        <div id="user" class="box" style="display:none; text-align:center">
            <div style="font-size: 50px;">👤</div>
            <h3 id="u-mail"></h3>
            <p id="u-status"></p>
            <button class="btn" style="background:#f1f3f4; color:#333; margin-top:20px" onclick="logout()">Выйти</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" id="n-home" onclick="nav('home')"><i>🏠</i>Лента</div>
        <div class="nav-item" id="n-fav" onclick="nav('fav')"><i>🤍</i>Избранное</div>
        <div class="nav-item" id="n-post" onclick="goPost()"><i>➕</i>Лот</div>
        <div class="nav-item" id="n-acc" onclick="nav('acc')"><i>👤</i>Профиль</div>
    </nav>

        function generateID(email) {
            let hash = 0; for (let i = 0; i < email.length; i++) hash = ((hash << 5) - hash) + email.charCodeAt(i);
            return Math.abs(hash % 10000);
        }

        function login(savedEmail) {

            }
            if(!savedEmail) toast("С возвращением!");
            nav('home');
        }

        function logout() { localStorage.removeItem('gemer_user'); location.reload(); }

        window.onload = () => {
            const remembered = localStorage.getItem('gemer_user');
            if(remembered) login(remembered);
        };
