<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GemerMarket Control Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* === ВОЗВРАЩАЕМ ВСЮ КРАСОТУ (CSS) === */
        :root { --p: #1a73e8; --bg: #f8f9fb; --white: #fff; --rad: 20px; --shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        body { font-family: 'Manrope', sans-serif; background: var(--bg); margin: 0; padding-bottom: 110px; color: #333; overflow-x: hidden; }
        
        /* Уведомление (Toast) */
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #333; color: white; padding: 14px 28px; border-radius: 30px; z-index: 5000; transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); font-size: 14px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        #toast.show { transform: translateX(-50%) translateY(0); }

        /* Шапка GemerMarket */
        .header { background: white; padding: 14px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.03); border-bottom: 1px solid #f1f1f1; }
        .brand { font-weight: 800; font-size: 22px; color: var(--p); text-decoration: none; letter-spacing: -0.5px; }
        .search-bar { flex: 1; position: relative; }
        .search-bar input { width: 100%; background: #f1f3f4; border: none; border-radius: 14px; padding: 12px 15px; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 15px; }
        .search-bar input:focus { background: white; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        
        /* Счетчик Онлайн */
        .online-status { background: #e8f5e9; color: #2e7d32; font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }
        .online-dot { width: 7px; height: 7px; background: #4caf50; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(76,175,80,0.4); } 70% { box-shadow: 0 0 0 6px rgba(76,175,80,0); } 100% { box-shadow: 0 0 0 0 rgba(76,175,80,0); } }

        /* Сетка товаров */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 16px; }
        .card { background: white; border-radius: var(--rad); overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; position: relative; animation: fadeIn 0.5s ease both; }
        .card:active { transform: scale(0.97); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .card img { width: 100%; height: 150px; object-fit: cover; background: #eee; }
        .card-info { padding: 12px; }
        .price { font-weight: 800; font-size: 18px; color: #000; }
        .title { font-size: 13px; color: #666; height: 32px; overflow: hidden; margin-top: 5px; line-height: 1.3; }

        /* Страницы */
        .page { display: none; padding-top: 10px; }
        .page.active { display: block; }
        
        /* Заголовки страниц */
        .page-title { margin: 10px 16px 20px; font-weight: 800; font-size: 24px; }

        /* Формы и боксы */
        .box { background: white; margin: 0 16px 20px; padding: 25px; border-radius: var(--rad); box-shadow: var(--shadow); border: 1px solid #f1f1f1; }
        .box h2 { margin-top: 0; font-weight: 800; }
        input, textarea, select { width: 100%; padding: 16px; margin-bottom: 14px; border: 1px solid #eee; border-radius: 14px; box-sizing: border-box; font-family: inherit; font-size: 15px; transition: 0.3s; background: #fafafa; }
        input:focus, textarea:focus, select:focus { border-color: var(--p); outline: none; background: white; }
        
        /* Красивая кнопка */
        .btn { background: var(--p); color: white; border: none; width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(26,115,232,0.3); }
        .btn:hover { box-shadow: 0 8px 20px rgba(26,115,232,0.4); }
        .btn:active { transform: scale(0.97); opacity: 0.9; }

        /* Нижнее меню */
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); display: flex; border-top: 1px solid #eee; padding: 14px 0; z-index: 1000; backdrop-filter: blur(10px); }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #bbb; cursor: pointer; font-weight: 700; transition: 0.3s; position: relative; }
        .nav-item.active { color: var(--p); }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 5px; font-style: normal; transition: 0.3s; }
        .nav-item.active i { transform: translateY(-3px); }

        .footer-info { text-align: center; padding: 25px; color: #bbb; font-size: 11px; line-height: 1.6; }
    </style>
</head>
<body>

        <div class="search-bar">
            <input type="text" id="q" placeholder="Поиск товаров..." oninput="update()">
        </div>
        <div id="online-status" class="online-status" style="display:none">
            <div class="online-dot"></div>
            <span id="online-count">Онлайн: 0</span>
        </div>
    </header>

    <div id="p-home" class="page active">

    <div id="p-fav" class="page">
        <h2 class="page-title">Мои Находки</h2>
        <div id="fav-feed" class="grid"></div>
    </div>
