<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemwaroldstore</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00d2ff; --bg: #0a0a0c; --card: #16161a; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Manrope', sans-serif; background: var(--bg); padding-bottom: 90px; color: var(--text); }
        
        .header { background: #16161a; padding: 12px; display: flex; align-items: center; gap: 8px; position: sticky; top: 0; z-index: 2000; border-bottom: 1px solid #23232e; }
        .logo { width: 32px; height: 32px; border-radius: 6px; object-fit: cover; }
        .brand { font-weight: 800; font-size: 14px; color: var(--p); text-transform: uppercase; white-space: nowrap; }

        /* ИСПРАВЛЕННЫЙ КОНТЕЙНЕР: Карточки больше не накладываются */
        .grid { 
            display: flex; 
            flex-wrap: wrap; /* Позволяет карточкам переходить на новую строку */
            padding: 8px;
            gap: 10px;
        }

        .card { 
            background: var(--card); 
            border-radius: 12px; 
            border: 1px solid #23232e; 
            width: calc(50% - 5px); /* Ровно половина экрана минус зазор */
            display: flex; 
            flex-direction: column;
            overflow: hidden;
            position: relative; /* Чтобы слои не перемешивались */
            margin-bottom: 5px;
        }

        .card img { 
            width: 100%; 
            height: 120px; 
            object-fit: cover; 
            display: block; /* Убирает лишние отступы снизу картинки */
        }

        .card-info { 
            padding: 10px; 
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .price { font-weight: 800; font-size: 16px; color: var(--p); margin-bottom: 4px; }

        .title { 
            font-size: 12px; 
            color: #a1a1aa; 
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 30px; /* Чтобы пустые места не схлопывались */
        }

        .admin-btn { 
            background: #ff4b4b; 
            color: white; 
            border: 0; 
            border-radius: 6px; 
            padding: 6px; 
            font-weight: 800; 
            font-size: 11px;
            margin-top: 10px;
            width: 100%;
        }

        /* Навигация и кнопки */
        .page { display: none; padding-top: 10px; }
        .page.active { display: block; }
        .box { background: var(--card); margin: 10px; padding: 15px; border-radius: 12px; border: 1px solid #23232e; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #23232e; border-radius: 10px; background: #0a0a0c; color: white; font-family: inherit; }
        .btn { background: var(--p); color: #000; border: none; width: 100%; padding: 14px; border-radius: 10px; font-weight: 800; }

        .nav { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #16161a; display: flex; border-top: 1px solid #23232e; z-index: 5000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #71717a; text-decoration: none; }
        .nav-item.active { color: var(--p); }
    </style>
</head>
<body>

    <header class="header">
        <img src="logo.jpg" class="logo" onclick="nav('home')" onerror="this.style.display='none'">
        <div class="brand" onclick="nav('home')">Gemwarold</div>
        <div style="flex:1">
            <input type="text" id="q" placeholder="Поиск..." oninput="updateSearch()" style="width:100%; background:#23232e; border:0; border-radius:8px; padding:8px; color:white; outline:none; font-size:14px;">
        </div>
    </header>

    <div id="p-home" class="page active"><div id="feed" class="grid"></div></div>
    
    <div id="p-post" class="page"><div class="box">
        <input type="text" id="in-title" placeholder="Название">
        <input type="number" id="in-price" placeholder="Цена BYN">
        <input type="file" id="in-file" accept="image/*" style="display:none" onchange="previewFile()">
        <button class="btn" style="background:#23232e; color:var(--p); margin-bottom:10px" onclick="document.getElementById('in-file').click()">📸 ФОТО</button>
        <img id="img-preview" style="width:100%; border-radius:8px; display:none; margin-bottom:10px">
        <button class="btn" id="save-btn" onclick="save()">ВЫСТАВИТЬ</button>
    </div></div>

    <div id="p-acc" class="page">
        <div id="auth" class="box"><h2>Вход</h2><input type="email" id="u-email" placeholder="Email"><button class="btn" onclick="login()">ВОЙТИ</button></div>
        <div id="user" class="box" style="display:none; text-align:center"><h3 id="u-mail"></h3><button class="btn" onclick="logout()" style="margin-top:10px">Выйти</button></div>
    </div>

    <nav class="nav">
        <div class="nav-item active" id="n-home" onclick="nav('home')">Витрина</div>
        <div class="nav-item" id="n-post" onclick="goPost()">Продать</div>
        <div class="nav-item" id="n-acc" onclick="nav('acc')">Профиль</div>
    </nav>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD4_NVq2Tw6TaEDMTZj86zbvtJUbHOE6js", authDomain: "kywar-c73ac.firebaseapp.com", databaseURL: "https://kywar-c73ac-default-rtdb.firebaseio.com", projectId: "kywar-c73ac", storageBucket: "kywar-c73ac.firebasestorage.app", messagingSenderId: "817464444818", appId: "1:817464444818:web:b9ab1f1ca2c9531358e34b" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ADMIN = "davidgemer507@gmail.com";
        let user = null, allData = [], currentBase64 = "";

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-'+id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
        }

        function previewFile() {
            const file = document.getElementById('in-file').files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                const img = new Image(); img.src = reader.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxW = 400; const scale = maxW / img.width;
                    canvas.width = maxW; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    currentBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('img-preview').src = currentBase64;
                    document.getElementById('img-preview').style.display = 'block';
                }
            };
            if (file) reader.readAsDataURL(file);
        }

        function save() {
            const t = document.getElementById('in-title').value, p = document.getElementById('in-price').value;
            if(!t || !p || !currentBase64) return alert("Заполни всё!");
            document.getElementById('save-btn').disabled = true;
            db.ref('items').push().set({ title: t, price: Number(p), img: currentBase64, owner: user, id: Date.now() }).then(() => location.reload());
        }

        function login() {
            const val = document.getElementById('u-email').value.trim().toLowerCase();
            if(!val) return;
            user = val; localStorage.setItem('gemer_user', user);
            location.reload();
        }

        function render(list) {
            const c = document.getElementById('feed'); if(!c) return;
            const isMeAdmin = user && user.toLowerCase() === ADMIN.toLowerCase();
            
            c.innerHTML = list.sort((a,b)=>b.id-a.id).map(i => `
                <div class="card">
                    <img src="${i.img}">
                    <div class="card-info">
                        <div class="price">${i.price} BYN</div>
                        <div class="title">${i.title}</div>
                        ${isMeAdmin ? `<button class="admin-btn" onclick="if(confirm('Удалить?')) db.ref('items').child('${i.key}').remove()">УДАЛИТЬ</button>` : ''}
                    </div>
                </div>`).join('');
        }

        function logout() { localStorage.removeItem('gemer_user'); location.reload(); }
        
        window.onload = () => {
            const saved = localStorage.getItem('gemer_user');
            if(saved) {
                user = saved;
                document.getElementById('auth').style.display = 'none';
                document.getElementById('user').style.display = 'block';
                document.getElementById('u-mail').innerText = user;
            }
        };

        function updateSearch() {
            const q = document.getElementById('q').value.toLowerCase();
            render(allData.filter(i => i.title.toLowerCase().includes(q)));
        }

        function goPost() { user ? nav('post') : nav('acc'); }

        db.ref('items').on('value', s => {
            allData = []; s.forEach(x => allData.push({...x.val(), key: x.key}));
            updateSearch();
        });
    </script>
</body>
    </html>
